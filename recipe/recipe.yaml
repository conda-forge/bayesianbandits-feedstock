schema_version: 1

context:
  name: bayesianbandits
  version: "1.3.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/bayesianbandits-${{ version }}.tar.gz
  sha256: ce5c2f0128843a67940851c96223567e9e6be9416357cb6dc980908d30a99e56

build:
  number: 1
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler("c") }}
  host:
    - python
    - setuptools >=75
    - cython >=3.0
    - numpy >=2.0
    - pip
  run:
    - python
    - scipy >=1.14.0
    - numpy >=2.0
    - scikit-learn >=1.5.2
    - attrs >=21.2.0
    - typing_extensions >=4.8.0

tests:
  - python:
      imports:
        - bayesianbandits
      pip_check: true

about:
  summary: A Pythonic microframework for Multi-Armed Bandit algorithms.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/bayesianbandits/bayesianbandits
  documentation: https://bayesianbandits.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - thewchan
